name: 'de_template'
version: '1.0.0'
config-version: 2

profile: 'de_template'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  de_template:
    staging:
      +materialized: view
      +schema: raw
      +tags: ['staging', 'daily']

    intermediate:
      +materialized: ephemeral
      +tags: ['intermediate']

    marts:
      +materialized: incremental
      +schema: dw
      +tags: ['marts', 'daily']
      +on_schema_change: fail

    dimensions:
      +materialized: table
      +schema: dw
      +tags: ['dimensions']

vars:
  # Override per environment
  start_date: '2026-01-01'
  lookback_days: 7
  offices: ['HCM', 'HN', 'DN']
  platforms: ['facebook', 'google', 'tiktok', 'zalo']
